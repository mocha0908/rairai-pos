<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAIRAI POS SYSTEM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --main: #0d124a; --bg: #f1f5f9; --accent: #facc15; --danger: #ef4444; }
    body { background: var(--bg); color: #1e293b; padding-bottom: 150px; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    
    /* 操作画面UI */
    .sticky-top { background: #fff; border-bottom: 2px solid var(--main); padding: 10px 15px !important; z-index: 1020; }
    .case-badge { display: inline-flex; align-items: center; gap: 5px; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; background: white; cursor: pointer; white-space: nowrap; }
    .case-badge.active { background: var(--main); color: white; border-color: var(--main); }
    .case-badge .del-btn { color: #94a3b8; font-size: 1rem; padding-left: 5px; }
    .case-badge.active .del-btn { color: #cbd5e1; }
    .waiting-badge { background: var(--accent); color: #854d0e; border-color: #eab308; }

    /* 数量ボタン */
    .qty-ctrl { display: flex; align-items: center; background: #f1f5f9; border-radius: 6px; border: 1px solid #ddd; width: fit-content; margin: auto; overflow: hidden; }
    .qty-ctrl.has-value { background: var(--main); color: white; border-color: var(--main); }
    .qty-btn { border: none; background: transparent; color: inherit; width: 34px; height: 34px; font-weight: bold; font-size: 1.2rem; }
    .qty-num { width: 42px; border: none; text-align: center; background: #fff; font-weight: bold; font-size: 0.95rem; height: 30px; }

    /* ----------------------------------------------------
       明細・印刷用スタイル（徹底改良）
    ---------------------------------------------------- */
    #receipt { background: #white; color: #000; line-height: 1.4; }
    .receipt-header { border-bottom: 3px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
    .receipt-title { font-size: 24px; font-weight: bold; letter-spacing: 4px; }
    
    /* 警告ラベル（操作画面用） */
    .cancel-alert-banner { background: var(--danger); color: white; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; margin-bottom: 15px; animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

    /* 帳票テーブルのデザイン */
    .table-receipt { width: 100%; border-top: 2px solid #000; border-bottom: 2px solid #000; border-collapse: collapse; margin-bottom: 20px; }
    .table-receipt th { background: #f2f2f2; border-bottom: 1px solid #000; padding: 10px 5px; font-size: 12px; }
    .table-receipt td { border-bottom: 1px dotted #ccc; padding: 8px 5px; font-size: 13px; }
    .total-row { background: #eee; font-size: 18px; font-weight: bold; border-top: 2px solid #000; }

    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: #fff !important; padding: 0 !important; }
      .no-print { display: none !important; }
      #receipt { display: block !important; padding: 0; }
      .table-receipt { border: 2px solid #000 !important; }
      .table-receipt th, .table-receipt td { border: 1px solid #000 !important; font-size: 11px !important; }
      /* 印刷時に合計欄を目立たせる */
      .total-amount-box { border: 4px double #000; padding: 10px; text-align: right; margin-top: 10px; }
    }

    .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--main); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1050; }
  </style>
</head>
<body>

<div id="main-ui" class="no-print">
  <div class="sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-bold" style="color:var(--main);">RAIRAI POS SYSTEM</div>
      <div class="btn-group">
        <button id="btn-table" class="btn btn-sm btn-outline-dark active" onclick="switchView('table')">リスト</button>
        <button id="btn-grid" class="btn btn-sm btn-outline-dark" onclick="switchView('grid')">タイル</button>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 overflow-auto pb-1">
      <button class="btn btn-primary btn-sm fw-bold px-3" onclick="createNewCase()">新規</button>
      <div id="waiting-area" class="d-flex gap-1"></div>
      <div id="case-list-area" class="d-flex gap-1 border-start ps-2"></div>
    </div>
  </div>

  <div class="search-area no-print shadow-sm p-3 bg-white border-bottom">
    <div id="cancel-banner" style="display:none;" class="cancel-alert-banner">
      <i class="bi bi-exclamation-triangle-fill"></i> 注意：満額査定（状態S）以外は全て返送希望のお客様です
    </div>
    <div class="row g-2">
      <div class="col-4"><input type="text" id="cust-name" class="form-control form-control-sm fw-bold" placeholder="顧客名" oninput="autoUpdateCaseName()"></div>
      <div class="col-5"><input type="text" id="search" class="form-control form-control-sm" placeholder="カード名検索..." oninput="draw()"></div>
      <div class="col-3"><button class="btn btn-dark btn-sm fw-bold w-100" onclick="showReceipt()">明細書</button></div>
    </div>
    <div id="filter-btns" class="d-flex gap-1 mt-2 overflow-auto"></div>
  </div>
  <div id="display-container"></div>
</div>

<div id="receipt" class="container" style="display:none;">
  <div class="receipt-header text-center">
    <div class="receipt-title">買取査定明細書</div>
    <div class="text-end small">発行日: <span id="r-date"></span></div>
  </div>
  
  <div id="receipt-meta" class="mb-3"></div>
  
  <table class="table-receipt">
    <thead>
      <tr>
        <th style="width:50%;">商品名 / ランク</th>
        <th style="width:15%;" class="text-center">単価</th>
        <th style="width:10%;" class="text-center">数量</th>
        <th style="width:25%;" class="text-end">小計</th>
      </tr>
    </thead>
    <tbody id="r-body"></tbody>
  </table>

  <div class="total-amount-box">
    <span style="font-size:14px;">合計査定金額(税込)</span><br>
    <span style="font-size:28px; font-weight:bold;">¥ <span id="r-total-amt"></span></span>
  </div>

  <div class="mt-2 small no-print" style="color:#666;">※数量の調整は下のボタンで行えます。</div>

  <div class="mt-4 d-flex flex-column gap-2 no-print">
    <button class="btn btn-success py-3 fw-bold shadow" onclick="window.print()"><i class="bi bi-printer"></i> 印刷・PDF保存</button>
    <button class="btn btn-primary py-3 fw-bold shadow" id="btn-finalize" onclick="finalizeTrade()"><i class="bi bi-check-circle"></i> 買取を確定して保存する</button>
    <button class="btn btn-outline-secondary py-2" onclick="hideReceipt()">編集に戻る</button>
  </div>
</div>

<div class="footer-bar no-print">
  <div class="h3 m-0 fw-bold">¥<span id="t-amt">0</span> <small class="fs-6 opacity-75 ms-2"><span id="t-qty">0</span>枚</small></div>
  <button class="btn btn-outline-warning btn-sm px-4 rounded-pill fw-bold" onclick="resetAll()">リセット</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwi7tWn74PWL-HD59oj7p1DZDdfddMn4wdJRJCCZJKznuBSLZ6GA88W6Lp-g1RrFkkSOw/exec";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {}, currentFilter = "", currentView = "table", waitingList = [];
  const filterMap = { "あ": "^[あいうえお]", "か": "^[かきくけこがぎぐげご]", "さ": "^[さしすせそざじずぜぞ]", "た": "^[たちつてとだぢづでど]", "な": "^[なにぬねの]", "は": "^[はひふへほ]", "ま": "^[まみむめも]", "や": "^[やゆよ]", "ら": "^[らりるれろ]", "わ": "^[わをん]" };

  window.onload = async () => {
    const fb = document.getElementById('filter-btns');
    ["ALL", ...Object.keys(filterMap)].forEach(l => {
      const b = document.createElement('button');
      b.className = `btn btn-outline-secondary btn-sm filter-btn ${l==="ALL"?'active':''}`; b.innerText = l;
      b.onclick = function() { document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active')); this.classList.add('active'); currentFilter = (l==="ALL") ? "" : filterMap[l]; draw(); };
      fb.appendChild(b);
    });

    const saved = localStorage.getItem('arpos_v10');
    if (saved) { cases = JSON.parse(saved); activeCaseId = localStorage.getItem('arpos_active_v10') || Object.keys(cases)[0]; }
    else { cases = { "default": { name: "新規", tel: "", data: {} } }; }

    try {
      const res = await fetch(GAS_URL);
      cards = await res.json();
      draw();
      loadCase(activeCaseId);
    } catch(e) { console.error("Load Error"); }
    setInterval(refreshWaiting, 15000); refreshWaiting();
  };

  function switchView(v) {
    currentView = v;
    document.getElementById('btn-table').classList.toggle('active', v==='table');
    document.getElementById('btn-grid').classList.toggle('active', v==='grid');
    draw();
  }

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || (c.name.toLowerCase().includes(sw) && (currentFilter === "" || new RegExp(currentFilter).test(c.name))));
    
    if (currentView === 'table') {
      let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th>商品名</th><th>S</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>`;
      html += filtered.map(c => {
        const ctrls = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<td><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}" readonly><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div><div class="text-center text-danger" style="font-size:0.65rem;">¥${p.toLocaleString()}</div></td>`;
        }).join('');
        const hasV = ['S','A','B','C','D'].some(t => (inputs[c.name+'-'+t]?.q || 0) > 0);
        return `<tr class="${hasV?'has-value-row':''}"><td><div class="d-flex align-items-center gap-2"><img src="${c.image}" style="width:35px;height:49px;object-fit:contain"><span class="small fw-bold">${c.name}</span></div></td>${ctrls}</tr>`;
      }).join('');
      container.innerHTML = html + `</tbody></table></div>`;
    } else {
      let html = `<div class="card-grid">`;
      html += filtered.map(c => {
        const ctrls = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<div class="d-flex align-items-center justify-content-between mb-2"><span class="fw-bold small">${t} <span class="text-danger">¥${p}</span></span><div class="qty-ctrl ${q>0?'has-value':''}" style="transform:scale(0.8);"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}" readonly><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div></div>`;
        }).join('');
        const hasV = ['S','A','B','C','D'].some(t => (inputs[c.name+'-'+t]?.q || 0) > 0);
        return `<div class="grid-item ${hasV?'has-value':''}"><img src="${c.image}" class="grid-img"><div class="fw-bold small mb-2">${c.name}</div>${ctrls}</div>`;
      }).join('');
      container.innerHTML = html + `</div>`;
    }
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc();
    if (document.getElementById('receipt').style.display === 'block') showReceipt(); else draw();
  }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { tq += i.q; ta += (i.q * i.p); });
    document.getElementById('t-qty').innerText = tq;
    document.getElementById('t-amt').innerText = ta.toLocaleString();
  }

  function showReceipt() {
    document.getElementById('main-ui').style.display='none'; document.getElementById('receipt').style.display='block';
    const b = document.getElementById('r-body'); b.innerHTML = "";
    let total = 0;
    Object.keys(inputs).forEach(key => {
      const i = inputs[key];
      const sub = i.q * i.p; total += sub;
      b.innerHTML += `<tr><td><div class="fw-bold">${i.n}</div><span class="small text-muted">${i.t}ランク</span></td><td class="text-center">¥${i.p.toLocaleString()}</td><td class="text-center">${i.q}</td><td class="text-end fw-bold">¥${sub.toLocaleString()}</td></tr>`;
    });
    document.getElementById('r-total-amt').innerText = total.toLocaleString();
    document.getElementById('r-date').innerText = new Date().toLocaleString();
    const cancelText = cases[activeCaseId].cancelIfSubMax === "希望する" ? `<div style="color:red; font-size:16px; margin-top:5px;">【！！満額査定以外返送希望！！】</div>` : "";
    document.getElementById('receipt-meta').innerHTML = `氏名: ${document.getElementById('cust-name').value || "未指定"} 様${cancelText}`;
  }

  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; draw(); }

  function loadCase(id) {
    if(!cases[id]) id = Object.keys(cases)[0]; activeCaseId = id; inputs = cases[id].data || {};
    document.getElementById('cust-name').value = cases[id].name === "新規" ? "" : cases[id].name;
    
    // 警告バナーの制御
    const banner = document.getElementById('cancel-banner');
    if (cases[id].cancelIfSubMax === "希望する") banner.style.display = "block";
    else banner.style.display = "none";
    
    calc(); draw(); updateCaseListUI();
  }

  function saveCurrentCase() { cases[activeCaseId].name = document.getElementById('cust-name').value || "新規"; cases[activeCaseId].data = inputs; localStorage.setItem('arpos_v10', JSON.stringify(cases)); localStorage.setItem('arpos_active_v10', activeCaseId); }
  function deleteCase(e, id) { e.stopPropagation(); if (Object.keys(cases).length <= 1) { inputs = {}; saveCurrentCase(); draw(); calc(); return; } delete cases[id]; if (activeCaseId === id) activeCaseId = Object.keys(cases)[0]; saveCurrentCase(); loadCase(activeCaseId); }
  function updateCaseListUI() { const area = document.getElementById('case-list-area'); area.innerHTML = ""; Object.keys(cases).forEach(id => { const b = document.createElement('div'); b.className = `case-badge ${id === activeCaseId ? 'active' : ''}`; b.innerHTML = `<span>${cases[id].name}</span><i class="bi bi-x-circle-fill del-btn" onclick="deleteCase(event, '${id}')"></i>`; b.onclick = () => loadCase(id); area.appendChild(b); }); }

  async function finalizeTrade() {
    if(!confirm("確定しますか？")) return;
    const btn = document.getElementById('btn-finalize'); btn.disabled = true;
    const tradeData = { action: "log_trade", customerName: document.getElementById('cust-name').value, totalQty: document.getElementById('t-qty').innerText, totalAmount: document.getElementById('t-amt').innerText.replace(/,/g, ''), items: Object.values(inputs).filter(i => i.q > 0) };
    try { const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(tradeData) }); const json = await res.json(); if(json.result === "SUCCESS") { alert("完了"); deleteCase({stopPropagation:()=>{}}, activeCaseId); hideReceipt(); } } catch(e) { alert("失敗"); } finally { btn.disabled = false; }
  }

  async function refreshWaiting() {
    try { const res = await fetch(GAS_URL + "?action=getWaiting"); const list = await res.json(); document.getElementById('waiting-area').innerHTML = list.map((c, i) => `<button class="case-badge waiting-badge" onclick="importWaiting(${i})"><i class="bi bi-person-fill"></i> ${c.name.substr(0,4)}</button>`).join(''); } catch(e){}
  }

  async function importWaiting(idx) {
    const c = waitingList[idx]; if(!confirm(c.name + "様を読み込む？")) return;
    const res = await fetch(`${GAS_URL}?action=search_full&searchTel=${c.tel}&searchName=${encodeURIComponent(c.name)}`);
    const json = await res.json(); const id = "c_" + Date.now();
    cases[id] = { name: c.name, tel: c.tel, cancelIfSubMax: c.cancelStatus, data: json.found ? json.data : {} };
    saveCurrentCase(); loadCase(id);
  }
  
  function createNewCase() { const id = "c_"+Date.now(); cases[id] = {name:"新規",data:{}}; loadCase(id); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function resetAll() { if(confirm('リセット？')) { inputs={}; saveCurrentCase(); draw(); calc(); } }
</script>
</body>
</html>
