<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAIRAI POS 最終完成版</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --main: #0d124a; --bg: #f1f5f9; --accent: #facc15; --danger: #ef4444; }
    body { background: var(--bg); color: #333; padding-bottom: 120px; font-family: sans-serif; }
    
    /* --- メインUI --- */
    .sticky-top { background: #fff; border-bottom: 2px solid var(--main); padding: 10px 15px !important; z-index: 1020; }
    .case-badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; background: white; cursor: pointer; min-width: 80px; margin-right: 5px; }
    .case-badge.active { background: var(--main); color: white; border-color: var(--main); }
    .case-badge .del-btn { color: #94a3b8; font-size: 1rem; padding-left: 5px; cursor: pointer; }
    .case-badge.active .del-btn { color: #fff; opacity: 0.7; }

    .search-area { background: #fff; padding: 10px 15px; border-bottom: 1px solid #e2e8f0; }
    .filter-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 8px; }
    .filter-btn { padding: 6px 0; font-size: 0.75rem; font-weight: bold; border-radius: 4px; border: 1px solid #ddd; background: #fff; text-align: center; }
    .filter-btn.active { background: #64748b; color: white; }

    .main-table-container { background: white; margin: 10px; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .main-table { width: 100%; min-width: 650px; border-collapse: collapse; }
    .main-table th { background: #f8fafc; padding: 12px; font-size: 0.75rem; text-align: center; color: #64748b; }
    .main-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .has-value-row { background-color: #fffbeb !important; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 15px; padding: 15px; }
    .grid-item { background: white; border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; min-height: 400px; }
    .grid-item.has-value { border: 2px solid var(--main); background: #fffbeb; }
    .grid-img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; background: #f8fafc; }
    .grid-card-name { font-size: 0.75rem; font-weight: bold; height: 3em; overflow: hidden; margin-bottom: 10px; }

    .grid-ctrl-table { width: 100%; font-size: 0.75rem; }
    .grid-ctrl-table td { padding: 3px 0; vertical-align: middle; }
    .price-tag { color: var(--danger); font-weight: bold; }

    /* 数量ボタン・手打ち入力 */
    .qty-ctrl { display: inline-flex; align-items: center; border-radius: 4px; border: 1px solid #cbd5e1; overflow: hidden; background: #fff; }
    .qty-ctrl.has-value { background: var(--main); color: white; border-color: var(--main); }
    .qty-btn { border: none; background: transparent; color: inherit; width: 30px; height: 30px; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    .qty-num { width: 44px; border: none; text-align: center; background: transparent; font-weight: bold; font-size: 1rem; color: inherit; outline: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--main); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1050; box-shadow: 0 -4px 10px rgba(0,0,0,0.2); }

    /* --- 明細・印刷画面（画面表示用） --- */
    .receipt-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; }
    .table-receipt { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .table-receipt th, .table-receipt td { border: 1px solid #dee2e6; padding: 12px 15px; vertical-align: middle; }
    .table-receipt th { background-color: #f8fafc; text-align: center; color: #64748b; font-size: 0.85rem; }
    .btn-delete-row { color: #ef4444; border: none; background: none; font-size: 1.2rem; cursor: pointer; }
    
    .print-only { display: none !important; }

    /* 🖨️ 印刷レイアウト（1ページに限界まで詰め込む設定） */
    @media print {
      /* 余白を最小化 */
      @page { size: A4; margin: 10mm; }
      body { background: #fff !important; color: #333 !important; font-size: 10pt; }
      .no-print, #main-ui, .footer-bar { display: none !important; }
      .print-only { display: table-cell !important; }
      
      /* 邪魔な余白や高さをすべて無効化 */
      #receipt { display: block !important; padding: 0 !important; margin: 0 !important; width: 100% !important; min-height: 0 !important; height: auto !important; }
      .receipt-container { padding: 0 !important; width: 100% !important; max-width: 100% !important; }

      /* 上部のタイトルやメタ情報を圧縮 */
      .receipt-title { margin-bottom: 10px !important; padding-bottom: 5px !important; font-size: 16pt !important; }
      #receipt-meta { margin: 0 0 10px 0 !important; padding: 8px !important; font-size: 10pt !important; }

      /* 表を圧縮（行間をギュッと詰める） */
      .table-receipt { border: 2px solid #000 !important; margin-top: 0 !important; }
      .table-receipt th, .table-receipt td { 
        border: 1px solid #000 !important; 
        padding: 4px 8px !important; /* パディングを大幅に削減 */
        color: #000 !important; 
        font-size: 10pt !important; /* 文字サイズを統一して縮小 */
        line-height: 1.3 !important; 
      }
      .table-receipt th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
      
      /* 印刷時のみ、インラインスタイルを強制上書きして文字を小さくする */
      .print-compress-text { font-size: 10pt !important; }
      .print-compress-total { font-size: 12pt !important; } /* 合計金額だけ少し大きく */
    }
  </style>
</head>
<body>

<div id="main-ui" class="no-print">
  <div class="sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-bold" style="color:var(--main);">RAIRAI POS SYSTEM</div>
      <div class="btn-group">
        <button id="btn-table" class="btn btn-sm btn-outline-dark active" onclick="switchView('table')">リスト</button>
        <button id="btn-grid" class="btn btn-sm btn-outline-dark" onclick="switchView('grid')">タイル</button>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 overflow-auto pb-1">
      <button class="btn btn-primary btn-sm fw-bold px-3" onclick="createNewCase()">新規</button>
      <div id="waiting-area" class="d-flex gap-1"></div>
      <div id="case-list-area" class="d-flex gap-1 border-start ps-2"></div>
    </div>
  </div>

  <div class="search-area shadow-sm">
    <div id="cancel-banner" style="display:none; background:var(--danger); color:white; padding:8px; text-align:center; font-weight:bold; margin-bottom:10px; border-radius:6px;">【⚠️ 満額以外返送希望案件 ⚠️】</div>
    <div class="row g-2 mb-1">
      <div class="col-4"><input type="text" id="cust-name" class="form-control form-control-sm fw-bold" placeholder="顧客名" oninput="autoUpdateCaseName()"></div>
      <div class="col-5"><input type="text" id="search" class="form-control form-control-sm" placeholder="カード検索..." oninput="draw()"></div>
      <div class="col-3"><button class="btn btn-dark btn-sm w-100 fw-bold" onclick="showReceipt()">明細確認</button></div>
    </div>
    <div id="filter-btns" class="filter-grid"></div>
  </div>
  <div id="display-container"></div>
</div>

<div id="receipt" style="display:none; background:white; min-height: 100vh;">
  <div class="receipt-container">
    <div class="text-center">
      <h3 class="fw-bold receipt-title" style="border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; letter-spacing: 2px;">買取査定明細書</h3>
    </div>
    
    <div id="receipt-meta" class="mb-3 mt-3 p-3 bg-light border rounded fw-bold" style="-webkit-print-color-adjust: exact;"></div>
    
    <table class="table-receipt">
      <thead>
        <tr>
          <th style="width: 45%; text-align: left;">商品名 / ランク</th>
          <th style="width: 15%; text-align: center;">単価</th>
          <th style="width: 20%; text-align: center;" class="no-print">数量</th>
          <th style="width: 15%; text-align: center;" class="print-only">数量</th>
          <th style="width: 15%; text-align: right;">小計</th>
          <th style="width: 5%; text-align: center;" class="no-print"></th>
        </tr>
      </thead>
      <tbody id="r-body"></tbody>
    </table>

    <div class="mt-5 d-flex flex-column gap-3 no-print">
      <button class="btn btn-success btn-lg fw-bold shadow" onclick="window.print()"><i class="bi bi-printer"></i> 印刷・PDF保存</button>
      <button class="btn btn-primary btn-lg fw-bold shadow" id="btn-finalize" onclick="finalizeTrade()"><i class="bi bi-cloud-upload"></i> 買取確定・保存</button>
      <button class="btn btn-outline-secondary py-3 fw-bold" onclick="hideReceipt()">編集に戻る</button>
    </div>
  </div>
</div>

<div class="footer-bar no-print">
  <div class="h3 m-0 fw-bold">¥<span id="t-amt">0</span> <small class="fs-6 opacity-75 ms-2"><span id="t-qty">0</span> 枚</small></div>
  <button class="btn btn-outline-warning btn-sm px-4 rounded-pill fw-bold shadow-sm" onclick="resetAll()">全初期化</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwi7tWn74PWL-HD59oj7p1DZDdfddMn4wdJRJCCZJKznuBSLZ6GA88W6Lp-g1RrFkkSOw/exec";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {}, currentFilter = "", currentView = "grid", waitingList = [];

  const filterMap = {"あ":"^[あいうえおアイウエオｱｲｳｴｵ]","か":"^[かきくけこがぎぐげごカキクケコガギグゲゴｶｷｸｹｺｶﾞｷﾞｸﾞｹﾞｺﾞ]","さ":"^[さしすせそざじずぜぞサシスセソザジズゼゾｻｼｽｾｿｻﾞｼﾞｽﾞｾﾞｿﾞ]","た":"^[たちつてとだぢづでどタチツテトダヂヂヅデドﾀﾁﾂﾃﾄﾀﾞﾁﾞﾂﾞﾃﾞﾄﾞ]","な":"^[なにぬねのナニヌネノﾅﾆﾇﾈﾉ]","は":"^[はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポﾊﾋﾌﾍﾎﾊﾞﾋﾞﾌﾞﾍﾞﾎﾞﾊﾟﾋﾟﾌﾟﾍﾟﾎﾟ]","ま":"^[まみむめもマミムメモﾏﾐﾑメモ]","や":"^[やゆよヤユヨﾔﾕﾖ]","ら":"^[らりるれろラリルレロﾗﾘﾙﾚﾛ]","わ":"^[わをんワヲンﾜｦﾝ]"};

  window.onload = async () => {
    const fb = document.getElementById('filter-btns');
    Object.keys(filterMap).forEach(l => {
      const b = document.createElement('button'); b.className = "filter-btn"; b.innerText = l;
      b.onclick = function() { document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); this.classList.add('active'); currentFilter = filterMap[l]; draw(); };
      fb.appendChild(b);
    });
    const saved = localStorage.getItem('rairai_pos_v25');
    if (saved) { cases = JSON.parse(saved); activeCaseId = localStorage.getItem('rairai_pos_active_id') || Object.keys(cases)[0]; }
    else { createNewCase(); }
    try { const res = await fetch(GAS_URL); cards = await res.json(); draw(); loadCase(activeCaseId); } catch(e) {}
    setInterval(refreshWaiting, 15000); refreshWaiting();
  };

  function switchView(v) { currentView = v; document.getElementById('btn-table').classList.toggle('active', v==='table'); document.getElementById('btn-grid').classList.toggle('active', v==='grid'); draw(); }

  function updateQtyManually(name, type, price, val) {
    const key = name + '-' + type;
    let q = parseInt(val, 10);
    if (isNaN(q) || q <= 0) { delete inputs[key]; } else { inputs[key] = { n: name, t: type, p: price, q: q }; }
    saveCurrentCase(); calc();
    if (document.getElementById('receipt').style.display === 'block') showReceipt(); else draw();
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc();
    if (document.getElementById('receipt').style.display === 'block') showReceipt(); else draw();
  }

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || (c.name.toLowerCase().includes(sw) && (currentFilter === "" || new RegExp(currentFilter).test(c.name))));
    
    if (currentView === 'table') {
      let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th style="width:35%">商品名</th><th>S</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>`;
      html += filtered.map(c => {
        const ctrls = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<td><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q||''}" onchange="updateQtyManually('${c.name}','${t}',${p},this.value)" placeholder="0"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div><div class="text-center text-danger small mt-1">¥${p.toLocaleString()}</div></td>`;
        }).join('');
        const hasV = ['S','A','B','C','D'].some(t => (inputs[c.name+'-'+t]?.q || 0) > 0);
        return `<tr class="${hasV?'has-value-row':''}"><td><div class="d-flex align-items-center gap-2"><img src="${c.image}" style="width:35px;height:49px;object-fit:contain"><span class="small fw-bold">${c.name}</span></div></td>${ctrls}</tr>`;
      }).join('');
      container.innerHTML = html + `</tbody></table></div>`;
    } else {
      let html = `<div class="card-grid">`;
      html += filtered.map(c => {
        const rows = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<tr><td style="width:20px; font-weight:900">${t}</td><td class="price-tag">¥${p.toLocaleString()}</td><td class="text-end"><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q||''}" onchange="updateQtyManually('${c.name}','${t}',${p},this.value)" placeholder="0"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div></td></tr>`;
        }).join('');
        const hasV = ['S','A','B','C','D'].some(t => inputs[c.name+'-'+t]?.q > 0);
        return `<div class="grid-item ${hasV?'has-value':''}"><img src="${c.image}" class="grid-img"><div class="grid-card-name">${c.name}</div><table class="grid-ctrl-table">${rows}</table></div>`;
      }).join('');
      container.innerHTML = html + `</div>`;
    }
  }

  function deleteRow(key) { delete inputs[key]; saveCurrentCase(); calc(); showReceipt(); draw(); }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { tq += i.q; ta += (i.q * i.p); });
    document.getElementById('t-qty').innerText = tq;
    document.getElementById('t-amt').innerText = ta.toLocaleString();
  }

  function showReceipt() {
    document.getElementById('main-ui').style.display='none'; 
    document.getElementById('receipt').style.display='block';
    const b = document.getElementById('r-body'); b.innerHTML = "";
    let total = 0;
    
    Object.keys(inputs).forEach(key => {
      const i = inputs[key];
      const sub = i.q * i.p; total += sub;
      b.innerHTML += `<tr>
        <td>
          <div class="fw-bold print-compress-text" style="font-size: 1.05rem;">${i.n}</div>
          <div class="small text-secondary fw-bold print-compress-text mt-1">【${i.t}ランク】</div>
        </td>
        <td class="text-center align-middle print-compress-text">¥${i.p.toLocaleString()}</td>
        <td class="text-center align-middle no-print">
          <div class="qty-ctrl has-value" style="margin:auto;">
            <button class="qty-btn" onclick="changeQty('${i.n}','${i.t}',${i.p},-1)">-</button>
            <input type="number" class="qty-num" value="${i.q}" onchange="updateQtyManually('${i.n}','${i.t}',${i.p},this.value)">
            <button class="qty-btn" onclick="changeQty('${i.n}','${i.t}',${i.p},1)">+</button>
          </div>
        </td>
        <td class="text-center align-middle print-only fw-bold print-compress-text">${i.q}</td>
        <td class="text-end align-middle fw-bold print-compress-text">¥${sub.toLocaleString()}</td>
        <td class="text-center align-middle no-print"><button class="btn-delete-row" onclick="deleteRow('${key}')"><i class="bi bi-trash3-fill"></i></button></td>
      </tr>`;
    });
    
    // 合計を普通の一行として追加
    b.innerHTML += `
      <tr style="background-color: #f1f5f9; border-top: 2px solid #000; -webkit-print-color-adjust: exact;" class="print-bg-gray">
        <td colspan="2" class="text-end fw-bold align-middle print-compress-text">合計査定額 (税込)</td>
        <td class="no-print"></td>
        <td class="print-only"></td>
        <td class="text-end text-danger fw-bold align-middle print-compress-total" style="font-size: 1.4rem;">¥ ${total.toLocaleString()}</td>
        <td class="no-print"></td>
      </tr>
    `;
    
    const cancelText = cases[activeCaseId].cancelIfSubMax === "希望する" 
      ? `<div style="color:var(--danger); font-size:1.1rem; margin-top:8px;" class="print-compress-text">【！！満額査定以外返送希望！！】</div>` : "";
    document.getElementById('receipt-meta').innerHTML = `
      <div style="font-size: 1.1rem;" class="print-compress-text">氏名: <span>${document.getElementById('cust-name').value || "未指定"}</span> 様</div>
      ${cancelText}
    `;
  }

  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; draw(); }
  
  let saveTimer;
  function saveCurrentCase() {
    if(!cases[activeCaseId]) return;
    cases[activeCaseId].name = document.getElementById('cust-name').value || "新規";
    cases[activeCaseId].data = inputs;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem('rairai_pos_v25', JSON.stringify(cases));
      localStorage.setItem('rairai_pos_active_id', activeCaseId);
    }, 500);
  }

  function loadCase(id) { if(!cases[id]) return; activeCaseId = id; inputs = cases[id].data || {}; document.getElementById('cust-name').value = cases[id].name === "新規" ? "" : cases[id].name; document.getElementById('cancel-banner').style.display = (cases[id].cancelIfSubMax === "希望する") ? "block" : "none"; calc(); draw(); updateCaseListUI(); }
  function createNewCase() { const id = "c_" + Date.now(); cases[id] = { name: "新規", data: {}, cancelIfSubMax: "希望しない" }; saveCurrentCase(); loadCase(id); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function updateCaseListUI() { const area = document.getElementById('case-list-area'); area.innerHTML = ""; Object.keys(cases).forEach(id => { const b = document.createElement('div'); b.className = `case-badge ${id === activeCaseId ? 'active' : ''}`; b.setAttribute('data-id', id); b.innerHTML = `<span>${cases[id].name}</span><i class="bi bi-x-circle-fill del-btn" onclick="deleteCase(event, '${id}')"></i>`; b.onclick = () => loadCase(id); area.appendChild(b); }); }
  function deleteCase(e, id) { e.stopPropagation(); if (Object.keys(cases).length <= 1) { inputs = {}; document.getElementById('cust-name').value = ""; saveCurrentCase(); loadCase(activeCaseId); return; } delete cases[id]; if (activeCaseId === id) activeCaseId = Object.keys(cases)[0]; saveCurrentCase(); loadCase(activeCaseId); }
  
  async function finalizeTrade() { if(!confirm("確定して保存しますか？")) return; const btn = document.getElementById('btn-finalize'); btn.disabled = true; const tradeData = { action: "log_trade", customerName: document.getElementById('cust-name').value, tel: cases[activeCaseId].tel || "", totalQty: document.getElementById('t-qty').innerText, totalAmount: document.getElementById('t-amt').innerText.replace(/,/g, ''), items: Object.values(inputs).filter(i => i.q > 0) }; try { const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(tradeData) }); const json = await res.json(); if(json.result === "SUCCESS") { alert("保存完了"); delete cases[activeCaseId]; if(Object.keys(cases).length===0) createNewCase(); else { activeCaseId=Object.keys(cases)[0]; loadCase(activeCaseId); } hideReceipt(); } } catch(e) {} finally { btn.disabled = false; } }
  
  async function refreshWaiting() { try { const res = await fetch(GAS_URL + "?action=getWaiting"); const list = await res.json(); document.getElementById('waiting-area').innerHTML = list.map((c, i) => `<button class="case-badge waiting-badge" onclick="importWaiting(${i})"><i class="bi bi-person-fill"></i> ${c.name.substr(0,4)}</button>`).join(''); } catch(e){} }
  async function importWaiting(idx) { const c = waitingList[idx]; if(!confirm(c.name + "様を読み込む？")) return; const id = "c_" + Date.now(); cases[id] = { name: c.name, tel: c.tel, cancelIfSubMax: c.cancelStatus, data: {} }; saveCurrentCase(); loadCase(id); }
  function resetAll() { if(confirm('全て消去しますか？')) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
